<!DOCTYPE html>
<html>
<style>
    #modal { display:none; position:fixed; top:20%; left:40%; padding:50px; background:white; border:1px solid #000; }
</style>
<body>
    <button onclick="document.getElementById('modal').style.display='block'">Open Popup</button>
    <div id="modal">
        <p>Hello! This is a modal.</p>
        <button onclick="document.getElementById('modal').style.display='none'">Close</button>
    </div>
</body>
</html>
