<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>7. Image Styling</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <link href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="p-8">
    <h2 class="text-xl font-bold mb-4">7. Image Styling</h2>
    
    <div class="mb-4 max-w-xs">
        <p class="text-sm text-gray-500 mb-1">Bootstrap:</p>
        <!-- Replace placeholder with your image path if needed -->
        <img src="https://picsum.photos/300/150" class="img-fluid rounded">
    </div>

    <div class="max-w-xs">
        <p class="text-sm text-gray-500 mb-1">Tailwind:</p>
        <img src="https://picsum.photos/300/150" class="w-full rounded">
    </div>
</body>
</html>
