<!DOCTYPE html>
<html>
<body>
    <input type="text" id="task"><button onclick="add()">Add Task</button>
    <ul id="list"></ul>
    <script>
        function add() {
            let task = document.getElementById("task").value;
            let li = document.createElement("li");
            li.textContent = task;
            document.getElementById("list").appendChild(li);
        }
    </script>
</body>
</html>
