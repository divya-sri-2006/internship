<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>8. Flexbox Layout</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <link href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="p-8">
    <h2 class="text-xl font-bold mb-4">8. Flexbox</h2>
    
    <div class="mb-4 border p-2">
        <p class="text-sm text-gray-500 mb-1">Bootstrap:</p>
        <div class="d-flex justify-content-between">
            <span>A</span>
            <span>B</span>
        </div>
    </div>

    <div class="border p-2">
        <p class="text-sm text-gray-500 mb-1">Tailwind:</p>
        <div class="flex justify-between">
            <span>A</span>
            <span>B</span>
        </div>
    </div>
</body>
</html>
