<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>4. Grid Layout</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <link href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="p-8">
    <h2 class="text-xl font-bold mb-4">4. Grid Layout</h2>
    
    <div class="mb-4">
        <p class="text-sm text-gray-500 mb-1">Bootstrap:</p>
        <div class="row text-center">
            <div class="col border p-2 bg-light">1</div>
            <div class="col border p-2 bg-light">2</div>
        </div>
    </div>

    <div>
        <p class="text-sm text-gray-500 mb-1">Tailwind:</p>
        <div class="grid grid-cols-2 gap-2 text-center">
            <div class="border p-2 bg-gray-100">1</div>
            <div class="border p-2 bg-gray-100">2</div>
        </div>
    </div>
</body>
</html>
