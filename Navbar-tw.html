<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3. Navbar Component</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <link href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="p-8">
    <h2 class="text-xl font-bold mb-4">3. Navbar</h2>
    
    <div class="mb-4">
        <p class="text-sm text-gray-500 mb-1">Bootstrap:</p>
        <nav class="navbar navbar-dark bg-dark px-3">
            <a class="navbar-brand text-white">Logo</a>
        </nav>
    </div>

    <div>
        <p class="text-sm text-gray-500 mb-1">Tailwind:</p>
        <nav class="bg-black p-3">
            <span class="text-white">Logo</span>
        </nav>
    </div>
</body>
</html>
