<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>10. Modal Structure</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <link href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="p-8">
    <h2 class="text-xl font-bold mb-4">10. Modal (Basic Layout)</h2>
    
    <div class="mb-5">
        <p class="text-sm text-gray-500 mb-1">Bootstrap Dynamic Trigger Setup:</p>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#mymodal">Open</button>
    </div>

    <div>
        <p class="text-sm text-gray-500 mb-1">Tailwind Static Structural Mockup:</p>
        <div class="relative max-w-sm p-5 border rounded bg-white shadow-md">
            <div class="font-bold border-b pb-2 mb-2">Modal Title</div>
            <p class="text-gray-600 text-sm">Modal Content Box Preview</p>
        </div>
    </div>
</body>
</html>
