<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2. Card Component</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <link href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="p-8">
    <h2 class="text-xl font-bold mb-4">2. Card</h2>
    
    <div class="mb-4">
        <p class="text-sm text-gray-500 mb-1">Bootstrap:</p>
        <div class="card" style="width:200px;">
            <div class="card-body">
                <h5 class="card-title">Title</h5>
                <p>Content</p>
            </div>
        </div>
    </div>

    <div>
        <p class="text-sm text-gray-500 mb-1">Tailwind:</p>
        <div class="w-52 p-4 border rounded shadow">
            <h5 class="text-lg font-bold">Title</h5>
            <p>Content</p>
        </div>
    </div>
</body>
</html>
