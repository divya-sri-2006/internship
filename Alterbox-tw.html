<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>6. Alert Box Component</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <link href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="p-8">
    <h2 class="text-xl font-bold mb-4">6. Alert Box</h2>
    
    <div class="mb-4">
        <p class="text-sm text-gray-500 mb-1">Bootstrap:</p>
        <div class="alert alert-success">Success!</div>
    </div>

    <div>
        <p class="text-sm text-gray-500 mb-1">Tailwind:</p>
        <div class="bg-green-200 text-green-800 p-3 rounded">Success!</div>
    </div>
</body>
</html>
