<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4. Grid Layout - Tailwind</title>
    <link href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="p-8 bg-gray-50">
    <h2 class="text-xl font-bold mb-4 text-gray-700">4. Grid Layout (Tailwind Only)</h2>
    
    <div class="grid grid-cols-2 gap-2 text-center text-gray-800">
        <div class="border border-gray-300 p-4 bg-gray-100 rounded">1</div>
        <div class="border border-gray-300 p-4 bg-gray-100 rounded">2</div>
    </div>
</body>
</html>
