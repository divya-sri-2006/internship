<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>5. Form Input Component</title>
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <link href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="p-8">
    <h2 class="text-xl font-bold mb-4">5. Form Input</h2>
    
    <div class="mb-4">
        <p class="text-sm text-gray-500 mb-1">Bootstrap:</p>
        <input class="form-control" placeholder="Enter name">
    </div>

    <div>
        <p class="text-sm text-gray-500 mb-1">Tailwind:</p>
        <input class="border p-2 rounded w-full" placeholder="Enter name">
    </div>
</body>
</html>
